<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BBK 9288S README artwork</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        background: #ffffff;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      .artboard {
        display: none;
        position: relative;
        overflow: hidden;
      }

      body[data-view="header"] .header,
      body[data-view="preview"] .preview,
      body[data-view="device"] .device {
        display: block;
      }

      .header {
        width: 1600px;
        height: 500px;
        background: #171b1d;
        color: #ffffff;
      }

      .header::after {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 780px;
        height: 12px;
        background: #188c82;
        content: "";
      }

      .header-copy {
        position: absolute;
        z-index: 2;
        top: 92px;
        left: 90px;
        width: 680px;
      }

      .header-model {
        display: grid;
        width: 92px;
        height: 92px;
        margin-bottom: 38px;
        border: 4px solid #ffffff;
        background: #f2d94e;
        color: #111516;
        font: 700 22px/1 "Courier New", monospace;
        place-items: center;
      }

      .header h1 {
        margin: 0;
        font-size: 70px;
        line-height: 1;
        letter-spacing: 0;
      }

      .header p {
        margin: 22px 0 0;
        color: #b9c0c1;
        font: 700 20px/1.4 "Courier New", monospace;
        letter-spacing: 0;
      }

      .header-specs {
        margin-top: 34px;
        color: #f2d94e;
        font: 700 16px/1 "Courier New", monospace;
        letter-spacing: 0;
      }

      .header-window {
        position: absolute;
        top: 42px;
        right: -270px;
        width: 980px;
        height: 416px;
        overflow: hidden;
        border: 1px solid #475053;
        background: #eef1f2;
        box-shadow: 0 24px 70px rgb(0 0 0 / 45%);
      }

      .header-window img {
        position: absolute;
        top: 0;
        left: 0;
        width: 980px;
        height: 551px;
      }

      .preview {
        width: 1600px;
        height: 900px;
        background: #eef1f2;
        color: #161a1c;
      }

      .preview-head {
        position: absolute;
        top: 52px;
        left: 64px;
        right: 64px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
      }

      .preview h2 {
        margin: 0;
        font-size: 48px;
        line-height: 1;
        letter-spacing: 0;
      }

      .preview-head p {
        margin: 0;
        color: #596164;
        font: 700 17px/1 "Courier New", monospace;
        letter-spacing: 0;
      }

      .preview-window {
        position: absolute;
        top: 140px;
        left: 64px;
        width: 1024px;
        height: 576px;
        overflow: hidden;
        border: 1px solid #b9c0c2;
        background: #ffffff;
        box-shadow: 0 18px 48px rgb(31 42 45 / 16%);
      }

      .preview-window img {
        width: 1024px;
        height: 576px;
      }

      .preview-device {
        position: absolute;
        top: 140px;
        right: 64px;
        width: 400px;
        height: 672px;
        border: 1px solid #2c3234;
        background: #171b1d;
      }

      .preview-device-label {
        position: absolute;
        top: 26px;
        left: 28px;
        right: 28px;
        display: flex;
        color: #ffffff;
        font: 700 14px/1 "Courier New", monospace;
        justify-content: space-between;
        letter-spacing: 0;
      }

      .preview-screen {
        position: absolute;
        top: 70px;
        left: 44px;
        width: 312px;
        height: 468px;
        overflow: hidden;
        border: 12px solid #303638;
        background: #f6f6f1;
      }

      .preview-screen img {
        position: absolute;
        top: -207px;
        left: -387px;
        width: 1331px;
        height: 749px;
        image-rendering: pixelated;
      }

      .preview-caption {
        position: absolute;
        right: 28px;
        bottom: 28px;
        left: 28px;
        border-top: 1px solid #596164;
        padding-top: 22px;
        color: #c8cecf;
        font: 700 15px/1.6 "Courier New", monospace;
        letter-spacing: 0;
      }

      .preview-foot {
        position: absolute;
        bottom: 52px;
        left: 64px;
        color: #188c82;
        font: 700 17px/1 "Courier New", monospace;
        letter-spacing: 0;
      }

      .device {
        width: 640px;
        height: 960px;
        background: #f6f6f1;
      }

      .device img {
        position: absolute;
        top: -424px;
        left: -791px;
        width: 2725px;
        height: 1533px;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <section class="artboard header">
      <div class="header-copy">
        <div class="header-model">9288S</div>
        <h1>BBK 9288S</h1>
        <p>QEMU HARDWARE EMULATOR</p>
        <div class="header-specs">S1C33L05 · 160 × 240 · 4 GRAY · WEB UI</div>
      </div>
      <div class="header-window">
        <img src="web-emulator.png" alt="" />
      </div>
    </section>

    <section class="artboard preview">
      <header class="preview-head">
        <h2>Hardware emulation, in the browser</h2>
        <p>QEMU / noVNC / PERSISTENT NAND</p>
      </header>
      <div class="preview-window">
        <img src="web-emulator.png" alt="" />
      </div>
      <div class="preview-device">
        <div class="preview-device-label">
          <span>BBK 9288S</span>
          <span>4 GRAY</span>
        </div>
        <div class="preview-screen">
          <img src="web-emulator.png" alt="" />
        </div>
        <div class="preview-caption">
          PIRATE SHIP<br />
          TOUCH + K5/P0 KEYS<br />
          REAL FIRMWARE PATH
        </div>
      </div>
      <div class="preview-foot">WEB CONTROL SURFACE + 9288S LCD CAPTURE</div>
    </section>

    <section class="artboard device">
      <img src="web-emulator.png" alt="" />
    </section>

    <script>
      const view = new URLSearchParams(location.search).get("view") || "header";
      document.body.dataset.view = view;
    </script>
  </body>
</html>
